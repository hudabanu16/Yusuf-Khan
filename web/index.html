<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="QUIK - Smart CRM & Quotation Management System">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="QUIK">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>QUIK</title>
    <link rel="manifest" href="manifest.json">

    <style>
        body {
          margin: 0;
          background: #EEF2F7; /* same as dashboard canvas */
          font-family: Arial, sans-serif;
        }

        #loader {
          position: fixed;
          inset: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #EEF2F7;
          z-index: 9999;
        }

        .loader-container {
          text-align: center;
          padding: 24px;
        }

        .logo {
          width: 84px;
          height: 84px;
          object-fit: contain;
          margin-bottom: 10px;
          filter: drop-shadow(0 10px 18px rgba(0,0,0,0.08));
        }

        .brand {
          margin: 0;
          font-size: 28px;
          font-weight: 900;
          letter-spacing: 0.4px;
          color: #111827;
        }

        .tagline {
          margin: 6px 0 0;
          font-size: 14px;
          color: #6B7280;
          font-weight: 600;
        }

        .spinner {
          margin: 20px auto 0;
          width: 42px;
          height: 42px;
          border: 4px solid #E5E7EB;
          border-top: 4px solid #2563EB; /* dashboard blue */
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
<!-- Professional Loader -->
<div id="loader">
    <div class="loader-container">
        <img src="icons/Icon-192.png" class="logo" alt="QUIK Logo" />
        <h1 class="brand">QUIK</h1>
        <p class="tagline">Smart CRM & Quotation System</p>
        <div class="spinner"></div>
    </div>
</div>

<!-- Hide loader when Flutter renders first frame -->
<script>
    window.addEventListener('flutter-first-frame', function () {
      const el = document.getElementById('loader');
      if (el) el.remove();
    });
</script>

<!-- Firebase Configuration -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMXuXMz_4AkvBjkht-5vq8tUUMK0U0zY4",
      authDomain: "genz-protech.firebaseapp.com",
      projectId: "genz-protech",
      storageBucket: "genz-protech.firebasestorage.app",
      messagingSenderId: "401330939326",
      appId: "1:401330939326:web:9c9299bb367e8ecd9e45ef",
      measurementId: "G-MZ2YC5ED2S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = app;
    window.firebaseAuth = auth;
    window.firebaseFirestore = db;

    console.log("Firebase initialized successfully!");
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
